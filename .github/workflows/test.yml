name: Run tests and upload coverage

on: 
  push

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"  

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/AdventuresInMinecraft-PC/MyAdventures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Run tests
        run: pytest --cov=MyAdventures --cov-report=xml

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
